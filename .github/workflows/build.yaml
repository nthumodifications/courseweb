name: Build and Deploy Monorepo

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      semester:
        description: "Semester to sync (e.g. 11510)"
        required: false
        default: "11510"

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Bun
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Install dependencies
      - name: Install dependencies
        run: bun install

      # Run tests for all services
      - name: Run tests
        run: |
          bun run test

      # Build all services
      - name: Build all services
        run: |
          bun run build

  check-migrations:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check that migration was generated for schema changes
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}

          SCHEMA_CHANGED=$(git diff --name-only "$BASE" "$HEAD" -- services/api/src/prisma/schema.prisma)
          if [ -z "$SCHEMA_CHANGED" ]; then
            echo "schema.prisma unchanged — no migration check needed."
            exit 0
          fi

          echo "schema.prisma changed. Verifying migration was generated..."

          PREVIOUS_CHANGED=$(git diff --name-only "$BASE" "$HEAD" -- services/api/src/prisma/schema.previous.prisma)
          if [ -z "$PREVIOUS_CHANGED" ]; then
            echo ""
            echo "ERROR: schema.prisma was changed but schema.previous.prisma was not updated."
            echo "Please run 'bun run prisma:migration:generate' in services/api and commit the result."
            exit 1
          fi

          NEW_MIGRATIONS=$(git diff --name-only "$BASE" "$HEAD" -- 'services/api/migrations/*.sql')
          if [ -z "$NEW_MIGRATIONS" ]; then
            echo ""
            echo "ERROR: schema.prisma was changed but no new migration SQL file was found."
            echo "Please run 'bun run prisma:migration:generate' in services/api and commit the result."
            exit 1
          fi

          echo "Migration check passed. New migration(s):"
          echo "$NEW_MIGRATIONS"

  migrate-db:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: services/api
          command: d1 migrations apply data-d1 --remote
          packageManager: bun

  deploy-api:
    runs-on: ubuntu-latest
    needs: [migrate-db]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Bun
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Install dependencies
      - name: Install dependencies
        run: bun install

      # Generate Prisma client for API service
      - name: Generate Prisma client
        run: |
          cd services/api
          bun run prisma:generate

      # Deploy API service to Cloudflare Workers
      - name: Deploy API Service
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: services/api
          command: deploy src/index.ts
          packageManager: bun

