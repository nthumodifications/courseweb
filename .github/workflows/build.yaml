  run-scraper:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run course scraper
        working-directory: tools/data-sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_API_KEY: ${{ secrets.ALGOLIA_API_KEY }}
          SEMESTER: ${{ github.event.inputs.semester || '11510' }}
        run: bun run src/sync-courses.ts ${{ github.event.inputs.semester || '11510' }}

  build-and-push-data-sync:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    permissions: write-all
    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Log in to GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and tag Docker image for data-sync
      - name: Build Data Sync Docker image
        run: |
          docker build -f tools/data-sync/Dockerfile . \
            -t ${{ env.IMAGE_NAME }}-data-sync:${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}-data-sync:latest

      # Push Docker image to GHCR
      - name: Push Data Sync Docker image
        run: |
          docker push ${{ env.IMAGE_NAME }}-data-sync:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}-data-sync:latest

  build-and-push-secure-api:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    permissions: write-all
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Secure API Docker image
        run: |
          docker build -f services/secure-api/Dockerfile . \
            -t ${{ env.IMAGE_NAME }}-secure-api:${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}-secure-api:latest

      - name: Push Secure API Docker image
        run: |
          docker push ${{ env.IMAGE_NAME }}-secure-api:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}-secure-api:latest

      - name: Trigger Coolify deployment
        if: success()
        run: |
          curl --request GET "https://delta.nthumods.com/api/v1/deploy?uuid=ag4g0sg8cosoo0cgcccwg4w8&force=false" \
            --header "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
